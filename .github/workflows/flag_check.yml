name: vulnerable-secret

on:
  issues:
    types: 
      - opened

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      flag: ${{ secrets.flag }}
      encrypt_key: ${{ github.event.issue.body }}
    steps:
      - name: Store Issue Title
        run:  echo ${{ github.event.issue.title }} > title.txt
        
      - name: Flag Check
        run:  |
              if grep -q "$password" "title.txt"; then
                echo "Now you are ready for the next step - ${{ secrets.next_step }}" > title.txt
              else
                echo " is a nice try but you aren't ready for what's next." >> title.txt
              fi
              
      - name: encrypt 
        run:  gpg --symmetric \
                  --cipher-algo AES256 \
                  --batch \
                  --yes \
                  --pinentry-mode loopback \
                  --passphrase "$encrypt_key" \
                  title.txt 
              
      - uses: actions/upload-artifact@v7
        with:
            name: title
            path: title.txt.gpg
            retention-days: 1
